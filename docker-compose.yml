# docker-compose.yml — Production deployment (Postgres + Redis + app)
#
# Brings up the full stack. App connects to local Postgres/Redis by default.
# Override DATABASE_URL / REDIS_URL in .env to point at managed services
# (Neon Postgres, Upstash Redis) for production.
#
# Usage:
#   docker compose up -d       # start
#   docker compose down        # stop
#   docker compose logs -f     # tail logs
#   docker compose ps         # status
#
# First boot:
#   cp .env.example .env
#   # Fill in DATABASE_URL, REDIS_URL, JWT_SECRET, ADMIN_EMAIL, ADMIN_PASSWORD
#   docker compose up -d

services:
  postgres:
    image: postgres:16-alpine
    container_name: pos-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-pos}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pos}
      POSTGRES_DB: ${POSTGRES_DB:-pos}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-pos} -d ${POSTGRES_DB:-pos}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - po-network

  redis:
    image: redis:7-alpine
    container_name: pos-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--maxmemory", "256mb", "--maxmemory-policy", "allkeys-lru"]
    volumes:
      - redis_data:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - po-network

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pos-app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL:-postgresql://pos:pos@postgres:5432/pos}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      APP_URL: ${APP_URL:-http://localhost:3000}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
      PORT: 3000
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      ADMIN_EMAIL: ${ADMIN_EMAIL:?ADMIN_EMAIL is required}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-}
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks:
      - po-network

volumes:
  postgres_data:
  redis_data:

networks:
  po-network:
    driver: bridge